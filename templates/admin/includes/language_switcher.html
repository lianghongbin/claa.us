{% load i18n %}
<form class="finance-lang-form" action="{% url 'set_language' %}" method="post">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <label class="finance-lang-form__label" for="finance-lang-select">{% trans "Language" %}</label>
  <select id="finance-lang-select" name="language" class="finance-lang-form__select" onchange="this.form.submit()">
    {% get_current_language as CURRENT_LANG %}
    {% for lang_code, lang_label in language_switcher_choices %}
    <option value="{{ lang_code }}"{% if lang_code == CURRENT_LANG %} selected{% endif %}>{{ lang_label }}</option>
    {% endfor %}
  </select>
</form>
